services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      ROUTER_MODE: offline
      USE_OPENAI_LLM: "false"
      EMBEDDING_PROVIDER: hash
      DATABASE_PATH: /app/data/app.db
      CHROMA_PATH: /app/data/chroma
      CHROMA_COLLECTION: knowledge_support
      KNOWLEDGE_BASE_PATH: /app/data/knowledge_base/raw/knowledge_base.json
      EVAL_DATASET_PATH: /app/data/eval/eval_dataset.json
      RETRIEVAL_TOP_K: "4"
      RETRIEVAL_MIN_SCORE: "0.35"
      ROUTING_MIN_CONFIDENCE: "0.60"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  ui:
    build: .
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      APP_ENV: local
      ROUTER_MODE: offline
      USE_OPENAI_LLM: "false"
      EMBEDDING_PROVIDER: hash
      DATABASE_PATH: /app/data/app.db
      CHROMA_PATH: /app/data/chroma
      CHROMA_COLLECTION: knowledge_support
      KNOWLEDGE_BASE_PATH: /app/data/knowledge_base/raw/knowledge_base.json
      EVAL_DATASET_PATH: /app/data/eval/eval_dataset.json
      RETRIEVAL_TOP_K: "4"
      RETRIEVAL_MIN_SCORE: "0.35"
      ROUTING_MIN_CONFIDENCE: "0.60"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      api:
        condition: service_healthy
